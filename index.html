y:384,s:18,sp:3.2,h:100,a:0},b=[],z=[],pt=[],sc=0,w=1,am=30,lm=30,ls=0,gr=true,k={},mx=512,my=384,ac;function ia(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)()}function ps(t){if(!ac)return;let o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);if(t=='s'){o.type='sawtooth';o.frequency.value=110;g.gain.value=.25;setTimeout(()=>g.gain.value=0,60)}else if(t=='h'){o.type='square';o.frequency.value=70;g.gain.value=.4;setTimeout(()=>g.gain.value=0,120)}else if(t=='z'){o.type='sawtooth';o.frequency.value=35;g.gain.value=.35;setTimeout(()=>g.gain.value=0,180)}o.start();setTimeout(()=>o.stop(),250)}function cp(x,y,col,c=6){for(let i=0;i<c;i++)pt.push({x:x,y:y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,l:18+Math.random()*12,col:col,sz:Math.random()*3+2})}function sz(){let sd=Math.floor(Math.random()*4),xx,yy;if(sd==0){xx=Math.random()*1024;yy=-25}else if(sd==1){xx=1049;yy=Math.random()*768}else if(sd==2){xx=Math.random()*1024;yy=793}else{xx=-25;yy=Math.random()*768}z.push({x:xx,y:yy,s:16,sp:1.1+w*.12,hh:35+w*8,mh:35+w*8,an:0})}function sw(){z=[];let nc=4+w*3;for(let i=0;i<nc;i++)setTimeout(()=>{if(gr)sz()},i*180)}function up(){if(!gr)return;let dx=0,dy=0;if(k['w']||k['ArrowUp'])dy--;if(k['s']||k['ArrowDown'])dy++;if(k['a']||k['ArrowLeft'])dx--;if(k['d']||k['ArrowRight'])dx++;if(dx||dy){let l=Math.hypot(dx,dy);p.x+=(dx/l)*p.sp;p.y+=(dy/l)*p.sp}p.x=Math.max(25,Math.min(999,p.x));p.y=Math.max(25,Math.min(743,p.y));p.a=Math.atan2(my-p.y,mx-p.x);for(let i=b.length-1;i>=0;i--){let bl=b[i];bl.x+=bl.vx;bl.y+=bl.vy;bl.l--;if(bl.l<=0||bl.x<0||bl.x>1024||bl.y<0||bl.y>768){b.splice(i,1);continue}for(let j=z.length-1;j>=0;j--){let zz=z[j];if(Math.hypot(bl.x-zz.x,bl.y-zz.y)<zz.s+3){zz.hh-=22;cp(bl.x,bl.y,'#fa0',5);ps('h');b.splice(i,1);if(zz.hh<=0){cp(zz.x,zz.y,'#f00',12);ps('z');sc+=90+w*15;z.splice(j,1)}break}}}for(let i=z.length-1;i>=0;i--){let zz=z[i];let dx=p.x-zz.x,dy=p.y-zz.y,ds=Math.hypot(dx,dy);if(ds>1){zz.x+=(dx/ds)*zz.sp;zz.y+ (-zz.s,-zz.s/2,zz.s*2,zz.s);x.fillStyle='#8a5a4a';x.beginPath();x.arc(0,-1,8,0,Math.PI*2);x.fill();x.fillStyle='#f00';x.fillRect(-4,-4,2.5,2.5);x.fillRect(2,-4,2.5,2.5);x.shadowBlur=6;x.shadowColor='#f00';x.fillRect(-4,-4,2.5,2.5);x.fillRect(2,-4,2.5,2.5);x.shadowBlur=0;x.fillStyle='#fff';x.fillRect(-12,-5,6,6);x.fillStyle='#000';x.fillText('Z',-10,0);x.fillStyle='#500';x.fillRect(-8,1,10,3);x.restore();if(zz.hh<zz.mh){x.fillStyle='#300';x.fillRect(zz.x-12,zz.y-22,24,3);x.fillStyle='#f00';x.fillRect(zz.x-12,zz.y-22,24*(zz.hh/zz.mh),3)}}for(let pr of pt){x.fillStyle=pr.col;x.globalAlpha=pr.l/22;x.fillRect(pr.x-pr.sz/2,pr.y-pr.sz/2,pr.sz,pr.sz)}x.globalAlpha=1;x.strokeStyle='#0f0';x.lineWidth=1.5;x.beginPath();x.moveTo(mx-12,my);x.lineTo(mx+12,my);x.moveTo(mx,my-12);x.lineTo(mx,my+12);x.stroke();let g=x.createRadialGradient(512,384,280,512,384,650);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,0.55)');x.fillStyle=g;x.fillRect(0,0,1024,768)}function sh(){if(!gr||am<=0||Date.now()-ls<110)return;ia();ps('s');let bs=13;b.push({x:p.x+Math.cos(p.a)*22,y:p.y+Math.sin(p.a)*22,vx:Math.cos(p.a)*bs,vy:Math.sin(p.a)*bs,l:40});am--;ls=Date.now();cp(p.x+Math.cos(p.a)*20,p.y+Math.sin(p.a)*20,'#ff0',4)}function gl(){up();dr();requestAnimationFrame(gl)}function rg(){p={x:512,y:384,s:18,sp:3.2,h:100,a:0};b=[];z=[];pt=[];sc=0;w=1;am=30;gr=true;document.getElementById('game-over').style.display='none';sw()}document.addEventListener('keydown',e=>{k[e.key.toLowerCase()]=true;if(e.key.toLowerCase()=='r'&&gr)am=lm;if(!gr&&e.key.toLowerCase()=='r')rg()});document.addEventListener('keyup',e=>{k[e.key.toLowerCase()]=false});c.addEventListener('mousemove',e=>{let r=c.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top});c.addEventListener('mousedown',e=>{if(e.button==0)sh()});c.addEventListener('touchstart',e=>{e.preventDefault();let r=c.getBoundingClientRect();mx=e.touches[0].clientX-r.left;my=e.touches[0].clientY-r.top;sh()});function sg(){ia();sw();gl();setTimeout(()=>{if(gr)sz()},600);setTimeout(()=>{if(gr){let ins=document.getElementById('instructions');ins.style.transition='opacity 1.2s';ins.style.opacity=.55}},7000)}window.onload=sg;</script></body></html>
